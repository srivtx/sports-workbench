<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sports-workbench logo">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8FF7A" />
      <stop offset="100%" stop-color="#7AAA1F" />
    </linearGradient>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#5EE6FF" />
      <stop offset="100%" stop-color="#7A7AE0" />
    </linearGradient>
  </defs>

  <!-- Square plate -->
  <rect x="10" y="10" width="140" height="140" rx="22" fill="url(#sg)" stroke="#0F1A0A" stroke-width="2" />

  <!-- S glyph (lime, drawn over a black background plate) -->
  <g transform="translate(28 28)">
    <!-- Black backdrop for contrast -->
    <rect x="0" y="0" width="48" height="104" rx="6" fill="#0F1A0A" opacity="0.18" />
    <!-- S strokes -->
    <path
      d="M 42 16
         C 42 6, 30 0, 18 0
         L 10 0
         C 2 0, -4 6, -4 16
         C -4 26, 2 32, 10 32
         L 26 32
         C 34 32, 40 38, 40 48
         C 40 58, 34 64, 26 64
         L 18 64
         C 6 64, -4 58, -4 48"
      fill="none" stroke="#0F1A0A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- W glyph -->
  <g transform="translate(78 28)" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="url(#wg)" stroke-width="14">
    <path d="M 2 0 L 14 104 L 26 36 L 38 104 L 50 0" />
  </g>
</svg>
