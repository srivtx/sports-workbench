name: refresh

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: init state + capture signals (120s)
        env:
          TXLINE_API_TOKEN: ${{ secrets.TXLINE_API_TOKEN }}
        run: |
          mkdir -p ./vercel/data
          echo '{"signals":[],"savedAt":null}' > ./vercel/data/live-signals.json
          timeout -s SIGINT 120 npx @srivtx/sports-workbench@latest signal \
            --devnet --strategy sharpDetector --threshold 0.5 \
            --state ./vercel/data/live-signals.json || true

      - name: commit & push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add vercel/data/
          git diff --staged --quiet || (git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
